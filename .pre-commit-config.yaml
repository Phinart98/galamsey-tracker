repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.0
    hooks:
      - id: ruff
        args: [--fix]
        files: ^apps/(api|bot)/|^pipelines/
      - id: ruff-format
        files: ^apps/(api|bot)/|^pipelines/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        files: ^apps/(api|bot)/|^pipelines/
        additional_dependencies:
          - pydantic>=2.9.0
          - fastapi>=0.115.0
          - psycopg[binary]>=3.2.0
          - geoalchemy2>=0.15.0
          - shapely>=2.0.0
          - sqlalchemy>=2.0.0
          - types-shapely

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: no-commit-to-branch
        args: [--branch, main]
