name: CI

on:
  push:
    branches: [master, main, "feat/**", "fix/**"]
  pull_request:
    branches: [master, main]

jobs:
  lint-python:
    name: Lint Python (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install API deps
        run: uv sync --extra dev
        working-directory: apps/api
      - name: ruff check
        run: uv run ruff check .
        working-directory: apps/api
      - name: mypy
        run: uv run mypy .
        working-directory: apps/api

  lint-web:
    name: Lint + typecheck Nuxt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: pnpm install
        working-directory: apps/web
      - name: Lint
        run: pnpm lint
        working-directory: apps/web
      - name: Typecheck
        run: pnpm typecheck
        working-directory: apps/web

  test-api:
    name: API tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install deps
        run: uv sync --extra dev
        working-directory: apps/api
      - name: pytest
        run: uv run pytest
        working-directory: apps/api

  test-migrations:
    name: Migrations + pgTAP tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Ubuntu 22.04 ships with PG14; we need PG17 + PostGIS + pgTAP.
      # Installing manually gives us full control over shared_preload_libraries.
      - name: Install PostgreSQL 17, PostGIS, pgTAP, pg_cron
        run: |
          sudo apt-get install -y -qq curl ca-certificates gnupg
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSLo /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] \
            https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            postgresql-17 \
            postgresql-17-postgis-3 \
            postgresql-17-pgtap \
            postgresql-17-cron \
            libtap-parser-sourcehandler-pgtap-perl

      - name: Configure and start PostgreSQL 17
        run: |
          # Stop the pre-installed PG14 to free port 5432
          sudo systemctl stop postgresql || true

          # Ubuntu 24.04 + PGDG: postgresql-17 install does NOT auto-create
          # the main cluster when PG14 already holds port 5432. Create it
          # explicitly. Idempotent: skip if already there from a prior step.
          if [ ! -d /etc/postgresql/17/main ]; then
            sudo pg_createcluster 17 main
          fi

          # shared_preload_libraries must be set before PG starts, but
          # pg_cron.database_name is intentionally NOT set: it defaults to
          # 'postgres' which always exists. Setting it to a not-yet-created
          # DB hangs PG startup (pg_cron bgworker can't reach its target DB).
          # Migration 0001 still installs pg_cron in galamsey_test cleanly.
          echo "shared_preload_libraries = 'pg_stat_statements,pg_cron'" \
            | sudo tee -a /etc/postgresql/17/main/postgresql.conf
          sudo pg_ctlcluster 17 main start

          # Hard 60s timeout with log dump so future failures don't hang the
          # whole runner -- cancellation revealed the previous version could
          # spin in the until-loop indefinitely if PG silently failed to bind.
          for i in $(seq 1 60); do
            if sudo -u postgres pg_isready -q; then
              echo "PG ready in ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "::error::PG never became ready in 60s. Last 30 lines of log:"
          sudo tail -30 /var/log/postgresql/postgresql-17-main.log || \
            sudo journalctl -u postgresql@17-main --no-pager -n 30
          exit 1

      - name: Create test database and roles
        run: |
          sudo -u postgres createdb galamsey_test
          sudo -u postgres psql -d galamsey_test <<'SQL'
            CREATE ROLE anon NOINHERIT;
            CREATE ROLE authenticated NOINHERIT;
            CREATE ROLE service_role NOINHERIT BYPASSRLS;
          SQL

      - name: Apply migrations
        run: |
          for f in $(ls infra/supabase/migrations/*.sql | sort); do
            echo "Applying $f..."
            sudo -u postgres psql \
              --dbname galamsey_test \
              --file "$f" \
              --variable ON_ERROR_STOP=1
          done

      - name: Run pgTAP tests
        run: |
          pg_prove \
            --dbname galamsey_test \
            --username postgres \
            --verbose \
            infra/supabase/tests/*.sql
